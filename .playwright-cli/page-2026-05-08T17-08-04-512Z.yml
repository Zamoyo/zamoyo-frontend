    - generic [ref=e49]:
      - paragraph [ref=e50]:
        - strong [ref=e51]: Sumsub
        - text: is a leading full-cycle verification platform that enables scalable compliance. From identity and business verification to ongoing monitoring, our platform adapts to different risk appetites and market demands, ensuring global compliance. It allows customizing analytics and workflows with a no-code interface.
      - paragraph [ref=e52]: Over 4,000 clients — including Bitpanda, Wirex, Avis, Bybit, Vodafone, Duolingo, Kaizen Gaming, and TransferGo — trust Sumsub to accelerate growth, prevent fraud, and maintain compliance worldwide.
      - paragraph [ref=e53]:
        - text: Now we are looking for a
        - strong [ref=e54]: Junior+ Frontend Developer
        - text: to build and optimize the Sumsub global website and marketing interfaces. This role is an exciting opportunity to
        - strong [ref=e55]: master a React 19 / Next.js 15
        - text: stack while shaping the visual identity of a leading global platform.
      - paragraph [ref=e56]:
        - strong [ref=e57]: "What You Will Be Doing:"
      - list [ref=e58]:
        - listitem [ref=e59]:
          - paragraph [ref=e60]:
            - strong [ref=e61]: UI Development
            - text: ": Building and maintaining high-performance landing pages and marketing components using React 19 and Next.js 15."
        - listitem [ref=e62]:
          - paragraph [ref=e63]:
            - strong [ref=e64]: Visual Excellence
            - text: ": Implementing smooth animations and micro-interactions with Framer Motion and GSAP to ensure a premium user experience."
        - listitem [ref=e65]:
          - paragraph [ref=e66]:
            - strong [ref=e67]: Content Integration
            - text: ": Connecting frontend components with Headless WordPress via GraphQL queries for seamless data delivery."
        - listitem [ref=e68]:
          - paragraph [ref=e69]:
            - strong [ref=e70]: Code Quality & Growth
            - text: ": Participating in code reviews and a large-scale refactoring initiative to migrate from legacy code to a modern stack."
        - listitem [ref=e71]:
          - paragraph [ref=e72]:
            - strong [ref=e73]: Performance Optimization
            - text: ": Monitoring and improving Core Web Vitals (LCP, CLS, INP) to keep the main website fast and SEO-friendly."
      - paragraph [ref=e74]:
        - strong [ref=e75]: "About You:"
      - list [ref=e76]:
        - listitem [ref=e77]:
          - paragraph [ref=e78]:
            - strong [ref=e79]: "Foundation:"
            - text: 1+ year of commercial experience with React, Next.js, and TypeScript.
        - listitem [ref=e80]:
          - paragraph [ref=e81]:
            - strong [ref=e82]: "Modern Styling:"
            - text: Good grasp of CSS/SCSS, including Flexbox, Grid, and a basic understanding of fluid layouts (like clamp()).
        - listitem [ref=e83]:
          - paragraph [ref=e84]:
            - strong [ref=e85]: "Eye for Detail:"
            - text: A genuine interest in the visual side of frontend (animations, transitions) and a desire to build polished user interfaces.
      - paragraph [ref=e86]:
        - strong [ref=e87]: "What We Offer:"
      - list [ref=e88]:
        - listitem [ref=e89]:
          - paragraph [ref=e90]:
            - strong [ref=e91]: Remote-first, trust-based culture.
            - text: Work from the place that works best for you. No mandatory office days, no attendance trackers. In some locations, we provide offices or coworking spaces, but the choice is yours.
        - listitem [ref=e92]:
          - paragraph [ref=e93]:
            - strong [ref=e94]: True flexibility.
            - text: We do not fix you to a 9-to-5 schedule. You can adjust your working hours when needed, as long as your day stays productive and in sync with the team.
        - listitem [ref=e95]:
          - paragraph [ref=e96]:
            - strong [ref=e97]: Extra time off.
            - text: Your birthday is a holiday here. Add to that 10 personal days each year, seven sick days without paperwork, and extra time to enjoy Christmas and New Year. Time to rest is part of the deal.
        - listitem [ref=e98]:
          - paragraph [ref=e99]:
            - strong [ref=e100]: Work that matters.
            - text: Our mission is to build a digital world that is secure, accessible and inclusive for everyone. From fighting fraud to making online services easier and safer to use, your work will have a real impact on how people experience trust online.
        - listitem [ref=e101]:
          - paragraph [ref=e102]:
            - strong [ref=e103]: Compensation.
            - text: We offer fair and transparent pay, benchmarked to the market.
        - listitem [ref=e104]:
          - paragraph [ref=e105]:
            - strong [ref=e106]: Truly global.
            - text: We work across continents and time zones, with teammates and customers from all over the world. You will run campaigns that cross borders, cultures, and languages, and see your ideas land worldwide.
        - listitem [ref=e107]:
          - paragraph [ref=e108]:
            - strong [ref=e109]: Growth built in.
            - text: Clear goals, open feedback and personal development plans. We support your progress with learning opportunities and by covering role-specific events, from design conferences to marketing forums.
        - listitem [ref=e110]:
          - paragraph [ref=e111]:
            - strong [ref=e112]: Team offsites.
            - text: Sometimes just Slack is not enough. That is why we meet in person a few times a year. Trips are fully covered, so you can meet, collaborate, and recharge together.
        - listitem [ref=e113]:
          - paragraph [ref=e114]:
            - strong [ref=e115]: Getting you set up.
            - text: We make sure you have access to the tools and hardware you need to do your work well.
        - listitem [ref=e116]:
          - paragraph [ref=e117]:
            - strong [ref=e118]: Friendly by design.
            - text: Our logo is a dog for a reason. We keep things human, open and kind. We welcome individuality, quirks and different perspectives, because that is what makes our work smarter and more fun.
      - paragraph [ref=e119]:
        - strong [ref=e120]: "The hiring stages:"
        - emphasis [ref=e121]
        - text: TA screening -> Hiring Manager Interview -> Final Interview.
      - paragraph [ref=e122]:
        - strong [ref=e123]: Sounds like a great opportunity for your career development? Then go ahead and apply!
        - emphasis [ref=e124]: We are a global community of innovators, creators, and thinkers, and we believe that diversity fuels our innovation. Sumsub is proud to be an equal opportunity employer, committed to building a diverse and inclusive workforce. We welcome applications from people of all backgrounds, cultures, genders, experiences, abilities and perspectives. Join us in shaping the future inclusively.
