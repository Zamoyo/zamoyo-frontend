        - text: "Belka è un Digital Product Studio che aiuta aziende con prodotti digitali a crescere. Siamo un team di 10 persone — strategist, designer e developer — che lavorano da Trento e in remoto. Negli ultimi cinque anni abbiamo collaborato con alcune delle aziende più innovative in Italia: Fatture in Cloud,"
